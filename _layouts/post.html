---
layout: default
---
<article class="section post-wrap">
  <div class="container prose post-content">
    <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}{% if page.topic %} · {{ page.topic }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
    {{ content }}
  </div>
</article>
