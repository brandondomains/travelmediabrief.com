---
layout: default
---
<section class="hero page-hero">
  <div class="container">
    {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
  </div>
</section>
<section class="section">
  <div class="container prose">
    {{ content }}
  </div>
</section>
